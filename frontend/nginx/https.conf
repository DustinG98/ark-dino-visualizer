# HTTPS server block for the production deployment.
#
# The frontend container's entrypoint copies this file to
# /etc/nginx/conf.d/https.conf (replacing any previous contents)
# only when the Let's Encrypt cert at the path below exists on
# disk. The cert path is baked at image build time via the
# CERTBOT_DOMAIN build arg, so no runtime envsubst is needed.
#
# Cert path constraint: the `ssl_certificate` and `ssl_certificate_key`
# directives below hard-code `/etc/letsencrypt/live/$CERTBOT_DOMAIN/`.
# If you bring your own cert (corporate CA, wildcard, etc.), mount it
# at exactly that path inside the frontend container — the entrypoint
# checks for the file by name regardless of how it got there. Any
# non-Let's-Encrypt path requires a code change here.

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/$CERTBOT_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$CERTBOT_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 20m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
