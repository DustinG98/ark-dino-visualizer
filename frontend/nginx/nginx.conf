# nginx configuration for the AI-Powered Alcohol Label Verification
# single-VPS deployment.
#
# Layout:
#   /                       -> static frontend (Vite build output)
#   /api/*                  -> reverse-proxied to the FastAPI backend
#   /docs, /redoc           -> reverse-proxied to the FastAPI backend
#   /.well-known/acme-challenge/ -> webroot for Let's Encrypt http-01
#
# The HTTPS server block lives in a separate file (https.conf) whose
# contents are managed by the frontend container's entrypoint on every
# start:
#   - cert present on disk: entrypoint writes the 443 server block
#   - cert absent:           entrypoint writes an empty file
# The include below is always present, so the config validates on
# first boot even before the cert is issued.

upstream backend_upstream {
    server backend:8000;
    keepalive 16;
}

# HTTP listener. Always active. Serves the ACME challenge on its
# webroot so certbot can issue the cert.
server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # ACME http-01 challenge. certbot writes its files to
    # /var/www/certbot/.well-known/acme-challenge/<token> and nginx
    # serves them back to the validator over plain HTTP on port 80.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# HTTPS listener. Always included; contents are managed by the
# frontend entrypoint. The file is either empty (HTTP-only mode, no
# cert on disk yet) or contains a `server { listen 443 ssl; ... }`
# block (HTTPS mode, cert has been issued).
include /etc/nginx/conf.d/https.conf;
